name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          if [ -z "$VERSION" ] || [ -z "$SHA256" ]; then
            echo "::error::Missing required payload fields (version, sha256)"
            exit 1
          fi

          URL="https://github.com/momhq/mom/archive/refs/tags/v${VERSION}.tar.gz"

          # Replace url line and add/update sha256
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/mom.rb
          if grep -q 'sha256' Formula/mom.rb; then
            sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/mom.rb
          else
            sed -i "/url \".*\"/a\\  sha256 \"${SHA256}\"" Formula/mom.rb
          fi

          echo "Updated Formula to v${VERSION}"
          cat Formula/mom.rb

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mom.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "formula: update mom to ${VERSION}"
          git push
